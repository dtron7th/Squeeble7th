    <script aria-label="Main">
        // Constrain element position within screen bounds
        function constrainToScreen(element) {
            const rect = element.getBoundingClientRect();
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            
            // Calculate the maximum allowed positions
            const maxX = screenWidth - rect.width;
            const maxY = screenHeight - rect.height;
            
            // Get current position from style or fallback to rect position
            let currentLeft = parseInt(element.style.left) || rect.left;
            let currentTop = parseInt(element.style.top) || rect.top;
            
            // Constrain to screen bounds
            const constrainedLeft = Math.max(0, Math.min(currentLeft, maxX));
            const constrainedTop = Math.max(0, Math.min(currentTop, maxY));
            
            // Apply constrained position
            element.style.left = constrainedLeft + 'px';
            element.style.top = constrainedTop + 'px';
            
            // Debug logging (remove in production)
            console.log('Constrained:', {
                element: element.id || element.className,
                original: { left: currentLeft, top: currentTop },
                constrained: { left: constrainedLeft, top: constrainedTop },
                bounds: { maxX, maxY },
                screenSize: { width: screenWidth, height: screenHeight },
                elementSize: { width: rect.width, height: rect.height }
            });
        }

        // Update drag handlers to constrain within bounds
        function makeDraggable(element, handle) {
            let isDragging = false;
            let startX, startY, initialLeft, initialTop;

            handle.addEventListener('mousedown', function(e) {
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                
                // Get initial position
                const rect = element.getBoundingClientRect();
                initialLeft = rect.left;
                initialTop = rect.top;
                
                element.style.transition = 'none';
                console.log('Drag started:', { startX, startY, initialLeft, initialTop });
            });

            document.addEventListener('mousemove', function(e) {
                if (isDragging) {
                    // Calculate new position based on mouse movement
                    const deltaX = e.clientX - startX;
                    const deltaY = e.clientY - startY;
                    
                    let newLeft = initialLeft + deltaX;
                    let newTop = initialTop + deltaY;
                    
                    // Apply constraints before setting position
                    const screenWidth = window.innerWidth;
                    const screenHeight = window.innerHeight;
                    const elementRect = element.getBoundingClientRect();
                    
                    const maxX = screenWidth - elementRect.width;
                    const maxY = screenHeight - elementRect.height;
                    
                    newLeft = Math.max(0, Math.min(newLeft, maxX));
                    newTop = Math.max(0, Math.min(newTop, maxY));
                    
                    element.style.left = newLeft + 'px';
                    element.style.top = newTop + 'px';
                    
                    console.log('Dragging:', { 
                        mouse: { x: e.clientX, y: e.clientY },
                        delta: { x: deltaX, y: deltaY },
                        position: { left: newLeft, top: newTop },
                        bounds: { maxX, maxY }
                    });
                }
            });

            document.addEventListener('mouseup', function() {
                if (isDragging) {
                    isDragging = false;
                    console.log('Drag ended');
                }
            });
        }

        // Reposition elements on window resize
        window.addEventListener('resize', function() {
            document.querySelectorAll('.window, .terminal, #QR_Home_Device_Info_Terminal').forEach(constrainToScreen);
        });

        // Universal App ID
        function generateUniversalAppID() {
            // Check if running in custom mobile browser environment
            const isCustomBrowser = window.customBrowserApp || navigator.userAgent.includes('CustomMobileBrowser') || window.VDN_CUSTOM_BROWSER;
            
            if (!isCustomBrowser) {
                // Generate placeholder ID for non-custom browsers
                return '0000000000-0000000000-0000000000';
            }
            
            // Check if custom browser already generated its own App ID
            if (window.customBrowserApp?.generatedAppID) {
                return window.customBrowserApp.generatedAppID;
            }
            
            // Allow custom browser to generate its own App ID
            if (window.customBrowserApp?.generateAppID && typeof window.customBrowserApp.generateAppID === 'function') {
                const customGeneratedID = window.customBrowserApp.generateAppID();
                if (customGeneratedID && typeof customGeneratedID === 'string') {
                    return customGeneratedID;
                }
            }
            
            // Fallback: Generate app-specific ID if custom browser doesn't provide one
            const appVersion = window.customBrowserApp?.version || '1.0.0';
            const appBuild = window.customBrowserApp?.build || '1';
            const appInstanceId = window.customBrowserApp?.instanceId || Math.random().toString(36).substr(2, 9);
            const deviceFingerprint = window.customBrowserApp?.deviceFingerprint || generateDeviceFingerprint();
            const installTimestamp = window.customBrowserApp?.installTime || Date.now();
            
            // Create app-specific unique string
            const appString = `VDN-${appVersion}-${appBuild}-${appInstanceId}-${deviceFingerprint}-${installTimestamp}`;
            
            // Generate hash from app-specific string
            let hash = 0;
            for (let i = 0; i < appString.length; i++) {
                const char = appString.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; // Convert to 32-bit integer
            }
            
            // Use the hash as seed for consistent app ID generation
            const seed = Math.abs(hash);
            const maxNumber = Math.pow(3000000000, 3);
            const randomNumber = (seed * parseInt(appInstanceId, 36)) % maxNumber;
            
            // Convert to string and format as XXXXXXXXXX-XXXXXXXXXX-XXXXXXXXXX
            const numberStr = randomNumber.toString().padStart(30, '0');
            const formatted = numberStr.slice(0, 10) + '-' + numberStr.slice(10, 20) + '-' + numberStr.slice(20, 30);
            
            return formatted;
        }

        // Helper function to generate device fingerprint for custom browser
        function generateDeviceFingerprint() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.textBaseline = 'top';
            ctx.font = '14px Arial';
            ctx.fillText('Device fingerprint', 2, 2);
            
            const fingerprint = [
                navigator.userAgent || '',
                navigator.language || '',
                screen.width + 'x' + screen.height,
                new Date().getTimezoneOffset(),
                canvas.toDataURL().slice(-50) // Last 50 chars of canvas fingerprint
            ].join('|');
            
            return fingerprint;
        }

        // Generate and store the Universal App ID
        const universalAppID = generateUniversalAppID();
        console.log('Universal App ID:', universalAppID);
        console.log('Custom Browser Detected:', universalAppID !== '0000000000-0000000000-0000000000');

     </script>

                <!--Book_Mark: QR HOME DEVICE INFO TERMINAL SCRIPT-->
                <script aria-label="QR_Home_Device_Info_Terminal_Script">

                    // Terminal Open/Close animations (Windows 11 style)
                    function openTerminal() {
                        const terminal = document.getElementById('QR_Home_Device_Info_Terminal');
                        
                        // Reset to CSS default position by clearing inline styles
                        terminal.style.left = '';
                        terminal.style.top = '';
                        
                        terminal.style.display = 'block';
                        terminal.style.opacity = '0';
                        terminal.style.transform = 'scale(0.95) translateY(10px)';
                        terminal.style.transition = 'opacity 0.2s ease-out, transform 0.2s ease-out';
                        
                        requestAnimationFrame(() => {
                            terminal.style.opacity = '1';
                            terminal.style.transform = 'scale(1) translateY(0)';
                        });
                    }

                    function closeTerminal() {
                        const terminal = document.getElementById('QR_Home_Device_Info_Terminal');
                        terminal.style.transition = 'opacity 0.15s ease-in, transform 0.15s ease-in';
                        terminal.style.opacity = '0';
                        terminal.style.transform = 'scale(0.95) translateY(10px)';
                        
                        setTimeout(() => {
                            terminal.style.display = 'none';
                            terminal.style.transform = '';
                            terminal.style.opacity = '';
                        }, 150);
                    }

                    // Update the Open_Device_Terminal button to use the animation
                    document.getElementById('Open_Device_Terminal').removeEventListener('click', function() {});
                    document.getElementById('Open_Device_Terminal').addEventListener('click', function() {
                        openTerminal();
                    });

                    // Terminal Dragging
                    (function() {
                        const terminal = document.getElementById('QR_Home_Device_Info_Terminal');
                        const header = terminal.querySelector('.QR_Home_Device_Info_Terminal_Header');
                        let isDragging = false;
                        let startX, startY, initialLeft, initialTop;

                        header.addEventListener('mousedown', function(e) {
                            isDragging = true;
                            startX = e.clientX;
                            startY = e.clientY;
                            
                            // Get initial position
                            const rect = terminal.getBoundingClientRect();
                            initialLeft = rect.left;
                            initialTop = rect.top;
                            
                            terminal.style.transition = 'none';
                            console.log('Terminal drag started:', { startX, startY, initialLeft, initialTop });
                        });

                        document.addEventListener('mousemove', function(e) {
                            if (isDragging) {
                                // Calculate new position based on mouse movement
                                const deltaX = e.clientX - startX;
                                const deltaY = e.clientY - startY;
                                
                                let newLeft = initialLeft + deltaX;
                                let newTop = initialTop + deltaY;
                                
                                // Apply constraints before setting position
                                const screenWidth = window.innerWidth;
                                const screenHeight = window.innerHeight;
                                const elementRect = terminal.getBoundingClientRect();
                                
                                const maxX = screenWidth - elementRect.width;
                                const maxY = screenHeight - elementRect.height;
                                
                                newLeft = Math.max(0, Math.min(newLeft, maxX));
                                newTop = Math.max(0, Math.min(newTop, maxY));
                                
                                terminal.style.left = newLeft + 'px';
                                terminal.style.top = newTop + 'px';
                                
                                console.log('Terminal dragging:', { 
                                    mouse: { x: e.clientX, y: e.clientY },
                                    delta: { x: deltaX, y: deltaY },
                                    position: { left: newLeft, top: newTop },
                                    bounds: { maxX, maxY }
                                });
                            }
                        });

                        document.addEventListener('mouseup', function() {
                            if (isDragging) {
                                isDragging = false;
                                console.log('Terminal drag ended');
                            }
                        });

                        // Touch support
                        header.addEventListener('touchstart', function(e) {
                            isDragging = true;
                            const touch = e.touches[0];
                            startX = touch.clientX;
                            startY = touch.clientY;
                            
                            // Get initial position
                            const rect = terminal.getBoundingClientRect();
                            initialLeft = rect.left;
                            initialTop = rect.top;
                            
                            terminal.style.transition = 'none';
                        });

                        document.addEventListener('touchmove', function(e) {
                            if (isDragging) {
                                const touch = e.touches[0];
                                const deltaX = touch.clientX - startX;
                                const deltaY = touch.clientY - startY;
                                
                                let newLeft = initialLeft + deltaX;
                                let newTop = initialTop + deltaY;
                                
                                // Apply constraints
                                const screenWidth = window.innerWidth;
                                const screenHeight = window.innerHeight;
                                const elementRect = terminal.getBoundingClientRect();
                                
                                const maxX = screenWidth - elementRect.width;
                                const maxY = screenHeight - elementRect.height;
                                
                                newLeft = Math.max(0, Math.min(newLeft, maxX));
                                newTop = Math.max(0, Math.min(newTop, maxY));
                                
                                terminal.style.left = newLeft + 'px';
                                terminal.style.top = newTop + 'px';
                            }
                        });

                        document.addEventListener('touchend', function() {
                            isDragging = false;
                        });
                    })();

                    // Terminal Grid Snapping
                    (function() {
                        const terminal = document.getElementById('QR_Home_Device_Info_Terminal');
                        const gridSize = 10;

                        function snapToGrid() {
                            const left = parseInt(terminal.style.left) || terminal.offsetLeft;
                            const top = parseInt(terminal.style.top) || terminal.offsetTop;
                            
                            terminal.style.left = Math.round(left / gridSize) * gridSize + 'px';
                            terminal.style.top = Math.round(top / gridSize) * gridSize + 'px';
                        }

                        document.addEventListener('mouseup', snapToGrid);
                        document.addEventListener('touchend', snapToGrid);
                    })();

                    // Terminal Main
                    (function() {
                        // Section 1: Element References
                        const terminal = document.getElementById('QR_Home_Device_Info_Terminal');
                        if (!terminal) return;

                        const minimizeBtn = terminal.querySelector('.minimize');
                        const maximizeBtn = terminal.querySelector('.maximize');
                        const closeBtn = terminal.querySelector('.close');
                        const outputDiv = terminal.querySelector('.terminal-output');

                        // Section 2: Terminal Content Setup
                        function initTerminalContent() {
                            const existingTextarea = terminal.querySelector('.terminal-output-text');
                            if (existingTextarea) existingTextarea.remove();

                            const terminalContent = document.createElement('div');
                            terminalContent.className = 'terminal-output-text';
                            terminalContent.style.cssText = 'white-space: pre-wrap; word-wrap: break-word; overflow-y: auto; cursor: text;';
                            outputDiv.appendChild(terminalContent);
                            return terminalContent;
                        }

                        // Section 3: Hidden Input Setup
                        function initHiddenInput() {
                            const hiddenInput = document.createElement('input');
                            hiddenInput.type = 'text';
                            hiddenInput.style.cssText = 'position: absolute; left: -9999px; opacity: 0; pointer-events: none;';
                            hiddenInput.setAttribute('autocomplete', 'off');
                            hiddenInput.setAttribute('autocorrect', 'off');
                            hiddenInput.setAttribute('autocapitalize', 'off');
                            hiddenInput.setAttribute('spellcheck', 'false');
                            terminal.appendChild(hiddenInput);
                            return hiddenInput;
                        }

                        // Section 4: Startup Message and Available Commands
                        function getStartupMessage() {
                            return [
                                'V-D-N Device Info',
                                '(C) 2026 Vista-D-NET. All rights reserved.',
                                '',
                                'Available commands:',
                                '  APPID     - Display Universal App ID',
                                '  EXIT      - Close the terminal',
                                ''
                            ];
                        }

                        // Section 5: State Variables
                        function initState() {
                            return {
                                commandHistory: [],
                                currentInput: '',
                                cursorVisible: true,
                                cursorInterval: null,
                                isLoadingStartup: false,
                                prompt: 'User:\\>'
                            };
                        }

                        // Section 6: Reset Function
                        function createResetFunction(state, renderFn) {
                            return function() {
                                state.commandHistory = [];
                                state.currentInput = '';
                                state.cursorVisible = true;
                                state.isLoadingStartup = false;
                                renderFn();
                            };
                        }

                        // Section 7: Load Startup Message Line by Line
                        function createStartupLoader(state, startupMessage, renderFn) {
                            return function() {
                                state.commandHistory = [];
                                state.isLoadingStartup = true;
                                let lineIndex = 0;

                                function loadNextLine() {
                                    if (lineIndex < startupMessage.length) {
                                        state.commandHistory.push(startupMessage[lineIndex]);
                                        renderFn();
                                        lineIndex++;
                                        setTimeout(loadNextLine, 100);
                                    } else {
                                        state.isLoadingStartup = false;
                                        renderFn();
                                    }
                                }

                                loadNextLine();
                            };
                        }

                        // Section 8: Command Execution
                        function createCommandExecutor(state, closeTerminalFn, startupMessage) {
                            return function(cmd) {
                                const command = cmd.trim().toUpperCase();
                                switch(command) {
                                    case 'APPID':
                                        // Get App ID directly from custom mobile browser
                                        let appID = 'App ID not available';
                                        
                                        // Check if running in custom mobile browser
                                        const isCustomBrowser = window.customBrowserApp || navigator.userAgent.includes('CustomMobileBrowser') || window.VDN_CUSTOM_BROWSER;
                                        
                                        if (isCustomBrowser) {
                                            // Try to get App ID from custom browser's own generation
                                            if (window.customBrowserApp?.generateAppID && typeof window.customBrowserApp.generateAppID === 'function') {
                                                try {
                                                    appID = window.customBrowserApp.generateAppID();
                                                } catch (error) {
                                                    appID = 'Error generating App ID: ' + error.message;
                                                }
                                            } else if (window.customBrowserApp?.generatedAppID) {
                                                appID = window.customBrowserApp.generatedAppID;
                                            } else {
                                                appID = 'Custom browser detected but no App ID generator available';
                                            }
                                        } else {
                                            appID = 'Custom mobile browser not detected';
                                        }
                                        
                                        return [
                                            'Universal App ID:',
                                            appID
                                        ];
                                    case 'EXIT':
                                        closeTerminalFn();
                                        return [];
                                    case '':
                                        return [];
                                    default:
                                        return ['Unknown command'];
                                }
                            };
                        }

                        // Section 9: Render Function
                        function createRenderFunction(state, terminalContent) {
                            return function() {
                                let output = '';
                                state.commandHistory.forEach(line => {
                                    output += line + '\n';
                                });
                                if (!state.isLoadingStartup) {
                                    const cursorChar = state.cursorVisible ? '_' : ' ';
                                    terminalContent.innerHTML = output + state.prompt + state.currentInput + '<span class="terminal-cursor" style="color: var(--main-text-color); animation: none;">' + cursorChar + '</span>';
                                } else {
                                    terminalContent.innerHTML = output;
                                }
                                terminalContent.scrollTop = terminalContent.scrollHeight;
                            };
                        }

                        // Section 10: Cursor Blink Functions
                        function createCursorFunctions(state, renderFn) {
                            let intervalId = null;
                            return {
                                start: function() {
                                    if (intervalId) {
                                        clearInterval(intervalId);
                                    }
                                    state.cursorVisible = true;
                                    renderFn();
                                    intervalId = setInterval(function() {
                                        state.cursorVisible = !state.cursorVisible;
                                        renderFn();
                                    }, 500);
                                    state.cursorInterval = intervalId;
                                },
                                stop: function() {
                                    if (intervalId) {
                                        clearInterval(intervalId);
                                        intervalId = null;
                                    }
                                    if (state.cursorInterval) {
                                        clearInterval(state.cursorInterval);
                                        state.cursorInterval = null;
                                    }
                                    state.cursorVisible = true;
                                    renderFn();
                                }
                            };
                        }

                        // Section 11: Close Terminal Function
                        function createCloseTerminalFunction(state, cursorFns, resetFn) {
                            return function() {
                                terminal.style.display = 'none';
                                cursorFns.stop();
                                resetFn();
                            };
                        }

                        // Section 12: Override Open Terminal
                        function setupOpenTerminalOverride(loadStartupFn, cursorFns) {
                            const originalOpenTerminal = window.openTerminal;
                            window.openTerminal = function() {
                                originalOpenTerminal();
                                loadStartupFn();
                                cursorFns.start();
                            };
                        }

                        // Section 13: Event Listeners - Click
                        function setupClickListener(terminalContent, hiddenInput) {
                            terminalContent.addEventListener('click', function() {
                                hiddenInput.focus();
                            });
                        }

                        // Section 14: Event Listeners - Input
                        function setupInputListener(state, hiddenInput, renderFn) {
                            hiddenInput.addEventListener('input', function(e) {
                                if (state.isLoadingStartup) return;
                                state.currentInput += e.data || '';
                                hiddenInput.value = '';
                                renderFn();
                            });
                        }

                        // Section 15: Event Listeners - Keydown
                        function setupKeydownListener(state, hiddenInput, executeCommandFn, renderFn) {
                            hiddenInput.addEventListener('keydown', function(e) {
                                if (state.isLoadingStartup) return;
                                if (e.key === 'Enter') {
                                    e.preventDefault();
                                    const fullLine = state.prompt + state.currentInput;
                                    state.commandHistory.push(fullLine);
                                    const result = executeCommandFn(state.currentInput);
                                    result.forEach(line => state.commandHistory.push(line));
                                    if (result.length > 0) state.commandHistory.push('');
                                    state.currentInput = '';
                                    renderFn();
                                } else if (e.key === 'Backspace') {
                                    e.preventDefault();
                                    state.currentInput = state.currentInput.slice(0, -1);
                                    renderFn();
                                }
                            });
                        }

                        // Section 16: Window Control Buttons
                        function setupWindowControls(closeTerminalFn) {
                            minimizeBtn.addEventListener('click', function() {
                                terminal.style.height = '30px';
                            });

                            maximizeBtn.addEventListener('click', function() {
                                terminal.style.height = '200px';
                            });

                            closeBtn.addEventListener('click', function() {
                                closeTerminalFn();
                            });
                        }

                        // Section 17: Initialize All Sections with Sequential Loading
                        function initializeTerminal() {
                            const loadDelay = 50;
                            let terminalContent, hiddenInput, startupMessage, state, render;
                            let resetTerminal, cursorFns, closeTerminalFn, executeCommand, loadStartupMessage;

                            const sections = [
                                {
                                    name: 'Section 2: Terminal Content Setup',
                                    load: function() {
                                        terminalContent = initTerminalContent();
                                    }
                                },
                                {
                                    name: 'Section 3: Hidden Input Setup',
                                    load: function() {
                                        hiddenInput = initHiddenInput();
                                    }
                                },
                                {
                                    name: 'Section 4: Startup Message and Available Commands',
                                    load: function() {
                                        startupMessage = getStartupMessage();
                                    }
                                },
                                {
                                    name: 'Section 5: State Variables',
                                    load: function() {
                                        state = initState();
                                    }
                                },
                                {
                                    name: 'Section 9: Render Function',
                                    load: function() {
                                        render = createRenderFunction(state, terminalContent);
                                    }
                                },
                                {
                                    name: 'Section 6: Reset Function',
                                    load: function() {
                                        resetTerminal = createResetFunction(state, render);
                                    }
                                },
                                {
                                    name: 'Section 10: Cursor Functions',
                                    load: function() {
                                        cursorFns = createCursorFunctions(state, render);
                                    }
                                },
                                {
                                    name: 'Section 11: Close Terminal Function',
                                    load: function() {
                                        closeTerminalFn = createCloseTerminalFunction(state, cursorFns, resetTerminal);
                                    }
                                },
                                {
                                    name: 'Section 8: Command Execution',
                                    load: function() {
                                        executeCommand = createCommandExecutor(state, closeTerminalFn, startupMessage);
                                    }
                                },
                                {
                                    name: 'Section 7: Startup Loader',
                                    load: function() {
                                        loadStartupMessage = createStartupLoader(state, startupMessage, render);
                                    }
                                },
                                {
                                    name: 'Section 12: Open Terminal Override',
                                    load: function() {
                                        setupOpenTerminalOverride(loadStartupMessage, cursorFns);
                                    }
                                },
                                {
                                    name: 'Section 13: Click Listener',
                                    load: function() {
                                        setupClickListener(terminalContent, hiddenInput);
                                    }
                                },
                                {
                                    name: 'Section 14: Input Listener',
                                    load: function() {
                                        setupInputListener(state, hiddenInput, render);
                                    }
                                },
                                {
                                    name: 'Section 15: Keydown Listener',
                                    load: function() {
                                        setupKeydownListener(state, hiddenInput, executeCommand, render);
                                    }
                                },
                                {
                                    name: 'Section 16: Window Controls',
                                    load: function() {
                                        setupWindowControls(closeTerminalFn);
                                    }
                                },
                                {
                                    name: 'Starting cursor blink',
                                    load: function() {
                                        cursorFns.start();
                                    }
                                },
                                {
                                    name: 'Initial render',
                                    load: function() {
                                        render();
                                    }
                                }
                            ];

                            let currentIndex = 0;

                            function loadNextSection() {
                                if (currentIndex < sections.length) {
                                    const section = sections[currentIndex];
                                    console.log('Loading ' + section.name + '...');
                                    section.load();
                                    currentIndex++;
                                    setTimeout(loadNextSection, loadDelay);
                                } else {
                                    console.log('Terminal initialization complete.');
                                }
                            }

                            loadNextSection();
                        }

                        // Section 18: Start sequential loading
                        initializeTerminal();
                    })();
                </script>
            </div>
        </div>
