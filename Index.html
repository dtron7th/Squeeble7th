<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

    <style aria-label="Root">
        :root {
            
        }
    </style>

    <div class="Managers">
        <script type="module" src="Managers.js">

        </script>
        <style aria-label="Managers">
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                width: 100dvw;
            }

            .Window {
                display: none;
            }

            button {
                border: none;
                outline: none;
                background: none;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            
            
        </style>
    </div>

</head>
<body>
    <div class="Login">
        <div class="Fire_Base_Login">
            <button id="Google_Signin" class="Auth_btn Google_Btn">Sign in with Google</button>
            <button id="Facebook_Signin" class="Auth_btn Facebook_Btn">Sign in with Facebook</button>
        </div>
            

        <style aria-label="Login - Styles">
            html, body {
                height: 100%;
                margin: 0;
                padding: 0;
            }
            
            .Login {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 100dvw;
                height: 100dvh;
                background-color: rgb(51, 51, 51);
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .Fire_Base_Login {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .Fire_Base_Login > .Auth_btn {
                width: 200px;
                height: 50px;
                
                
                background-color: rgb(0, 0, 0);
                color: #fff;

            }
        </style>
        <script aria-label="Login - Scripts">
            
        </script>
    </div>
    <div class="Home">

        <style aria-label="Home - Styles">
            .Home {
                display: none;
            }
        </style>
        <script aria-label="Home - Scripts">
            
        </script>

    </div>
</body>
</html>
