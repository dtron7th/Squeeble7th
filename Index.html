<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Window Component</title>

    <!--Book_Mark: HEAD SECTION-->
    <!-- Font Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <!--Book_Mark: UI COMPONENTS-->
    <div class="UI" style="display: none;">
        <!--Book_Mark: WINDOW COMPONENT-->
        <!-- Window Component -->
        <div class="window" id="">
            <div class="window-header">
                <div class="window-title">
                    <div class="window-title-text">Window</div>
                </div>
                <div class="window-controls">
                    <div class="window-button minimize"></div>
                    <div class="window-button maximize"></div>
                    <div class="window-button close"></div>
                </div>
            </div>
            <div class="window-content">
                
            </div>
        </div>


        <!--Book_Mark: TERMINAL COMPONENT-->
        <!-- Terminal Component -->
        <div class="terminal" id="">
            <div class="terminal-header">
                <div class="terminal-title">
                    <div class="terminal-title-text">Terminal</div>
                </div>
                <div class="terminal-controls">
                    <div class="terminal-button minimize"></div>
                    <div class="terminal-button maximize"></div>
                    <div class="terminal-button close"></div>
                </div>
            </div>
            <div class="terminal-output">
                <div class="terminal-output-text">Welcome to the terminal!</div>
            </div>
        </div>
        
        <!--Book_Mark: NAVIGATION BAR COMPONENT-->
        <!-- Navigation Bar Component -->
        <div class="navigation-bar" id="">
            
        </div>

        <!--Book_Mark: CLOCK COMPONENT-->
        <!-- Clock Component -->
        <div class="clock" id="">
            <span class="clock-time">00:00:00</span>
            <span>-</span>
            <span class="clock-date">00/00/00</span>

            <script aria-label="Clock">
                function updateClockTime() {
                    const now = new Date();
                    const hours = String(now.getHours()).padStart(2, '0');
                    const minutes = String(now.getMinutes()).padStart(2, '0');
                    const seconds = String(now.getSeconds()).padStart(2, '0');
                    document.querySelector('.clock-time').textContent = `${hours}:${minutes}:${seconds}`;
                }

                function updateClockDate() {
                    const now = new Date();
                    const options = { weekday: 'short', month: 'short', day: 'numeric' };
                    document.querySelector('.clock-date').textContent = now.toLocaleDateString('en-US', options);
                }

                updateClockTime();
                updateClockDate();
                setInterval(updateClockTime, 1000);
                setInterval(updateClockDate, 60000);
            </script>
        </div>
        
    </div>

    <!--Book_Mark: CSS STYLES-->
    <!--Book_Mark: MAIN CSS VARIABLES & GLOBAL STYLES-->
    <!-- Main CSS Variables & Global Styles -->
    <style aria-label="Main">
        :root {
            --main-text-color: rgb(255, 255, 255);
            --font-size: 10px;
            --main-box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.3);

            --main-ui-color: rgba(0, 0, 0, 0.137);
            --header-color: rgba(255, 255, 255, 0.05);

            --ui-border-radius: 5px;

            --ui-back-drop: 30px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inconsolata", monospace;
        }

        body {
            background-color: rgb(255, 255, 255);
        }
    </style>
    <!--Book_Mark: WINDOW COMPONENT STYLES-->
    <!-- Window Component Styles -->
    <style aria-label="Window">
        .window {
            width: 300px;
            height: 200px;
            background: var(--main-ui-color);
            backdrop-filter: blur(var(--ui-back-drop));
            border-radius: var(--ui-border-radius);
            box-shadow: var(--main-box-shadow);
            overflow: hidden;
            display: none;
        }

        .window > .window-header {
            width: 100%;
            height: 30px;
            background-color: var(--header-color);
            display: flex;
            align-items: center;
        }

        .window > .window-title {
            display: flex;
            align-items: center;
            text-indent: 10px;
        }

        .window > .window-title > .window-title-text {
            color: var(--main-text-color);
            font-size: var(--font-size);
        }

        .window > .window-controls {
            position: absolute;
            right: 10px;
            display: flex;
            gap: 10px;
        }

        .window > .window-controls > .window-button {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .window > .window-controls > .window-button:hover {
            opacity: 0.8;
        }

        .window > .window-controls > .minimize {
            background: #ffbb00;
        }

        .window > .window-controls > .maximize {
            background: #5eff00;
        }

        .window > .window-controls > .close {
            background: #ff0000;
        }

        .window > .window-content {
            padding: 20px;
            color: white;
        }
    </style>

    <!--Book_Mark: TERMINAL COMPONENT STYLES-->
    <!-- Terminal Component Styles -->
    <style aria-label="Terminal">
        .terminal {
            width: 300px;
            height: 200px;
            background: var(--main-ui-color);
            backdrop-filter: blur(var(--ui-back-drop));
            border-radius: var(--ui-border-radius);
            box-shadow: var(--main-box-shadow);
            overflow: hidden;
            display: none;
        }

        .terminal-header {
            width: 100%;
            height: 30px;
            background-color: var(--header-color);
            display: flex;
            align-items: center;
        }

        .terminal-title {
            display: flex;
            align-items: center;
            text-indent: 10px;
        }

        .terminal-title-text {
            color: var(--main-text-color);
            font-size: var(--font-size);
        }

        .terminal-controls {
            position: absolute;
            right: 10px;
            display: flex;
            gap: 10px;
        }

        .terminal-button {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .terminal-button:hover {
            opacity: 0.8;
        }

        .minimize {
            background: #ffbb00;
        }

        .maximize {
            background: #5eff00;
        }

        .close {
            background: #ff0000;
        }

        .terminal-output {
            display: flex;
            height: calc(100% - 30px);
            justify-content: center;
            align-items: center;
            
        }
        
        .terminal-output-text {
            color: var(--main-text-color);
            font-size: var(--font-size);
            width: calc(100% - 20px);
            height: calc(100% - 20px);
        }
    </style>

    <!--Book_Mark: NAVIGATION BAR COMPONENT STYLES-->
    <!-- Navigation Bar Component Styles -->
    <style aria-label="Navigation_Bar">
       .navigation-bar {
            position: absolute;
            width: calc(100% - 20px);
            height: 30px;
            display: flex;
            align-items: center;
            background-color: var(--main-ui-color);
            backdrop-filter: blur(var(--ui-back-drop));
            border-radius: var(--ui-border-radius);
            box-shadow: var(--main-box-shadow);
            overflow: hidden;
       }
    </style>

    <!--Book_Mark: BUTTON COMPONENT STYLES-->
    <!-- Button Component Styles -->
    <style aria-label="Button">
        button {
            border: none;
            background: none;
            outline: none;
            color: var(--main-text-color);
            font-size: var(--font-size);
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>

    <style aria-label="clock">
        .clock {
            position: absolute;
            color: var(--main-text-color);
            font-size: var(--font-size);
            display: flex;
            flex-direction: row;
            align-items: center;
        }

        .clock-time {
            font-size: calc(var(--font-size) * 2);
            font-weight: bold;
        }

        .clock-date {
            font-size: var(--font-size);
            opacity: 0.8;
        }

    </style>

</head>
<body>

</html>
