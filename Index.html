<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

    <style aria-label="Root">
        :root {
            
        }
    </style>

    <div class="Managers">
        <script type="module" src="Managers.js">

        </script>
        <style aria-label="Managers">
            .Window {
                display: none;
            }
            
            /* Basic auth button styles - customize as needed */
            .auth-btn {
                display: block;
                width: 100%;
                padding: 12px 20px;
                margin: 10px 0;
                border: none;
                border-radius: 4px;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                transition: opacity 0.2s ease;
            }
            
            .auth-btn:hover {
                opacity: 0.9;
            }
            
            .google-btn {
                background: #4285f4;
                color: white;
            }
            
            .facebook-btn {
                background: #1877f2;
                color: white;
            }
            
            #error-message {
                color: #d32f2f;
                background: #ffebee;
                border: 1px solid #ffcdd2;
                padding: 8px 12px;
                border-radius: 4px;
                margin: 10px 0;
                font-size: 14px;
            }
            
            .Home {
                text-align: center;
                padding: 20px;
            }
            
            .user-info img {
                border-radius: 50%;
                width: 80px;
                height: 80px;
                margin: 15px 0;
            }
        </style>
    </div>

</head>
<body>
    <div class="Login">
        <h2>Sign In</h2>
            <button id="google-signin-btn" class="auth-btn google-btn">Sign in with Google</button>
            <button id="facebook-signin-btn" class="auth-btn facebook-btn">Sign in with Facebook</button>
        <div id="error-message">
            
        </div>
    </div>
    <div class="Home">

    </div>
</body>
</html>
