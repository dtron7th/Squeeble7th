<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

    <style aria-label="Root">
        :root {
            --Main-UI-Color: rgb(255, 255, 255);
        }
    </style>

    <style aria-label="Main">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
    </style>

    <div class="Managers">
        <script aria-label="Managers">

        </script>
        <style aria-label="Managers">

            .Window {
                display: none;
            }

            button {
                border: none;
                outline: none;
                background: none;
                display: flex;
                justify-content: center;
                align-items: center;
                color: var(--Main-UI-Color);
            }
            
          
        </style>
    </div>

    <style aria-label="Managers">
        .Managers {
            display: none;
        }
    </style>

</head>
<body>
    <div class="Login">
        <div class="Fire_Base_Login">
            <button id="Google_Signin" class="Auth_btn Google_Btn">Sign in with Google</button>
            <button id="Facebook_Signin" class="Auth_btn Facebook_Btn">Sign in with Facebook</button>
        </div>
            

        <style aria-label="Login - Styles">
            .Login {
                width: 100dvw;
                height: 100dvh;
                background-color: rgb(51, 51, 51);
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .Fire_Base_Login {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .Fire_Base_Login > #Google_Signin {
                width: 200px;
                height: 30px;
                background-color: rgb(219, 68, 55);

            }
        </style>
        <script aria-label="Login - Scripts">
            
        </script>
    </div>
    <div class="Home">

        <style aria-label="Home - Styles">
            .Home {
                display: none;
            }
        </style>
        <script aria-label="Home - Scripts">
            
        </script>

    </div>
</body>
</html>
